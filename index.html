<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farewell Countdown</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Orbitron',sans-serif;
  height:100vh;
  overflow:hidden;
  background: radial-gradient(circle at center,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

/* animated glow bg */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:conic-gradient(#ff00cc,#3333ff,#00ffcc,#ffcc00,#ff00cc);
  animation:spin 15s linear infinite;
  opacity:.15;
}

@keyframes spin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

.container{
  text-align:center;
  z-index:2;
  max-width:90%;
}

h1{
  font-size:2.5rem;
  margin-bottom:30px;
  text-shadow:0 0 20px #00ffff;
}

/* TIMER */
.timer{
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
  animation:pulse 1s infinite alternate;
}

@keyframes pulse{
  from{transform:scale(1)}
  to{transform:scale(1.05)}
}

.box{
  background:rgba(0,0,0,.5);
  padding:20px;
  border-radius:20px;
  min-width:110px;
  box-shadow:0 0 20px #00ffff, inset 0 0 15px #00ffff;
}

.number{
  font-size:2rem;
  font-weight:900;
}

.label{
  font-size:.8rem;
  opacity:.8;
}

/* Farewell messages */
.celebrate{
  font-size:1.6rem;
  opacity:0;
  transform:translateY(30px);
  margin:12px 0;
  transition:all .6s ease;
}

.celebrate.show{
  opacity:1;
  transform:translateY(0);
}

/* confetti canvas */
canvas{
  position:absolute;
  top:0;
  left:0;
  pointer-events:none;
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="container">

  <h1>😭 Goodbye P’Air 😭</h1>

  <div class="timer" id="timer">
    <div class="box">
      <div class="number" id="days">0</div>
      <div class="label">DAYS</div>
    </div>
    <div class="box">
      <div class="number" id="hours">0</div>
      <div class="label">HOURS</div>
    </div>
    <div class="box">
      <div class="number" id="minutes">0</div>
      <div class="label">MINUTES</div>
    </div>
    <div class="box">
      <div class="number" id="seconds">0</div>
      <div class="label">SECONDS</div>
    </div>
  </div>

  <!-- Farewell Messages -->
  <div class="celebrate">ลาก่อน พี่แอร์ 😭😭😭😭😭💔💔</div>
  <div class="celebrate">さようなら ピーエア 😭😭😭😭😭💧💧</div>
  <div class="celebrate">안녕히 가세요 피에어 😭😭😭😭😭😭</div>
  <div class="celebrate">再见 皮艾尔 😭😭😭😭😭💦</div>
  <div class="celebrate">Au revoir P’Air 😭😭😭😭😭💔</div>
  <div class="celebrate">Adiós P’Air 😭😭😭😭😭😭</div>
  <div class="celebrate">Auf Wiedersehen P’Air 😭😭😭😭😭💧</div>
  <div class="celebrate">Adeus P’Air 😭😭😭😭😭😭</div>
  <div class="celebrate">До свидания Пи-Эйр 😭😭😭😭😭💦</div>
  <div class="celebrate">وداعًا بي إير 😭😭😭😭😭💔</div>

</div>

<script>

/* ===== COUNTDOWN ===== */

function getNextFriday(){
  const now=new Date();
  const target=new Date();
  target.setHours(17,30,0,0);

  const day=now.getDay();
  const diff=(5-day+7)%7;
  target.setDate(now.getDate()+diff);

  if(diff===0 && now>target){
    target.setDate(target.getDate()+7);
  }
  return target;
}

const daysEl=document.getElementById("days");
const hoursEl=document.getElementById("hours");
const minutesEl=document.getElementById("minutes");
const secondsEl=document.getElementById("seconds");
const timer=document.getElementById("timer");

function showFarewell(){
  const messages=document.querySelectorAll(".celebrate");

  messages.forEach((el,index)=>{
    setTimeout(()=>{
      el.classList.add("show");
    }, index*500); // 0.5 วิ ต่อบรรทัด
  });
}

function update(){
  const now=new Date();
  const target=getNextFriday();
  const diff=target-now;

  if(diff<=0){
    timer.style.display="none";
    showFarewell();
    startConfetti();
    return;
  }

  const d=Math.floor(diff/(1000*60*60*24));
  const h=Math.floor((diff/(1000*60*60))%24);
  const m=Math.floor((diff/(1000*60))%60);
  const s=Math.floor((diff/1000)%60);

  daysEl.textContent=d;
  hoursEl.textContent=h;
  minutesEl.textContent=m;
  secondsEl.textContent=s;
}

setInterval(update,1000);
update();

/* ===== CONFETTI ===== */

function startConfetti(){
  const canvas=document.getElementById("confetti");
  const ctx=canvas.getContext("2d");
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;

  const pieces=Array.from({length:200},()=>({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*8+2,
    speed:Math.random()*3+2,
    color:`hsl(${Math.random()*360},100%,50%)`
  }));

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.fillStyle=p.color;
      ctx.fillRect(p.x,p.y,p.size,p.size);
      p.y+=p.speed;
      if(p.y>canvas.height)p.y=0;
    });
    requestAnimationFrame(draw);
  }

  draw();
}

</script>

</body>
</html>
